<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="images/icon.png">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/form.css">
        <title>Card Sale Announcement Submission</title>
    </head>
    <body>
        <header>
            <a href="index.html">
                <img src="images/logo.png" alt="Card Sales" width="100" height="100">
            </a>
            <h1>Card Sales</h1>
        </header>

        <nav>
            <ul>
                <li>
                    <a href="cardSaleForm.html">Post Announcement</a>
                </li>
                <li>
                    <a href="userRegistration.html">User Registration</a>
                </li>
                <li>
                    <a href="cardSale1Details.html">Carta 1</a>
                </li>
                <li>
                    <a href="cardSale2Details.html">Carta 2</a>
                </li>
                <li>
                    <a href="cardSale3Details.html">Carta 3</a>
                </li>
            </ul>
        </nav>
        
        <main>
            <h1>Submit a New Card Sale Announcement</h1>
            <form action="submit_card_sale.html" method="post" enctype="multipart/form-data">
                <!-- Card Name -->
                <label for="cardName">Card Name:</label><br>
                <input type="text" id="cardName" name="cardName" required><br><br>
    
                <!-- Announcement Author -->
                <label for="author">Announcement Author:</label><br>
                <input type="text" id="author" name="author" required><br><br>
    
                <!-- Announcement Date -->
                <label for="announcementDate">Announcement Date:</label><br>
                <input type="date" id="announcementDate" name="announcementDate" required><br><br>
    
                <!-- Card Condition -->
                <label for="cardCondition">Card Condition:</label><br>
                <select id="cardCondition" name="cardCondition" required>
                    <option value="mint">Mint</option>
                    <option value="near-mint">Near-Mint</option>
                    <option value="played">Played</option>
                    <option value="worn">Worn</option>
                </select><br><br>
    
                <!-- Descriptive Text -->
                <label for="description">Announcement Description:</label><br>
                <textarea id="description" name="description" rows="5" cols="50" required></textarea><br><br>
    
                <!-- Card Image -->
                <label for="cardImage">Card Image:</label><br>
                <input type="file" id="cardImage" name="cardImage" accept="image/*" required><br><br>
    
                <!-- Submit Button -->
                <input type="submit" value="Submit Announcement">
            </form>
        </main>

        <footer>
            <h6>Lapo card shop - Copyleft CC-by 2025 by Lapo</h6>
        </footer>

    </body>
</html>
