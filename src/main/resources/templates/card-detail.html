<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/card.css">
    <title>Dettaglio Carta</title>
</head>
<body>
<header>
    <a href="/">
        <img src="/images/logo.png" alt="Card Sales" width="100" height="100">
    </a>
    <h1>Card Sales</h1>
</header>

<nav>
    <ul>
        <li><a href="/card/new">Post Announcement</a></li>
        <li><a href="/register">User Registration</a></li>
        <li><a href="/card/1">Carta 1</a></li>
        <li><a href="/card/2">Carta 2</a></li>
        <li><a href="/card/3">Carta 3</a></li>
    </ul>
</nav>

<main>
    <h1 th:text="${card.name}"></h1>
    <img th:src="@{'/images/card' + ${card.id % 3 + 1} + '.jpg'}" alt="Card image" width="200">
    <dl class="card-description">
        <dt>Autore:</dt>
        <dd th:text="${card.author}"></dd>
        <dt>Data:</dt>
        <dd th:text="${#dates.format(card.date, 'dd/MM/yyyy')}"></dd>
        <dt>Condizione:</dt>
        <dd th:text="${card.condition}"></dd>
        <dt>Tipo:</dt>
        <dd th:text="${card.cardType}"></dd>
        <dt>Descrizione:</dt>
        <dd th:text="${card.description}"></dd>
    </dl>
    <a th:href="@{/card/{id}/edit(id=${card.id})}">Modifica</a>
    <a th:href="@{/card/{id}/delete(id=${card.id})}" onclick="return confirm('Sei sicuro di voler eliminare questa carta?')">Elimina</a>
</main>

<footer>
    <h6>Lapo card shop - Copyleft CC-by 2025 by Lapo</h6>
</footer>
</body>
</html>
