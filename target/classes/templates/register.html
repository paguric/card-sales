<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{ base :: common_header(~{::title},~{}) }">

        <title>Register</title>

        <!-- Additional links go here -->
        <!-- If links are added, change ~{} to ~{::link} above in th:replace -->
        <!-- link rel="stylesheet" href="/css/form.css" -->
    </head>
    <body>
        <!-- Header -->
        <header th:replace="~{index :: header}"> </header>

        <!-- Navbar -->
        <nav th:replace="~{index :: navbar}"> </nav>

        <!-- Main Section -->
        <main class="container pb-5 pb-5r">
            <h2 class="card-title mb-4">Sign up</h2>
            <div class="card">
                <form id="registrationForm" class="card-body" th:action="@{/register}" method="post">

                    <!-- First name -->
                    <div th:replace="~{base :: formInput (id='name', inputType='text', text='First name')}"> </div>

                    <!-- Last name -->
                    <div th:replace="~{base :: formInput (id='surname', inputType='text', text='Last name')}"> </div>

                    <!-- Userame -->
                    <div th:replace="~{base :: formInput (id='username', inputType='text', text='Username')}"> </div>

                    <!-- Password -->
                    <div th:replace="~{base :: formInput (id='password', inputType='password', text='Password')}"> </div>

                    <!-- Password confirm -->
                    <div th:replace="~{base :: formInput (id='passwordConfirm', inputType='password', text='Password confirm')}"> </div>

                    <!-- Button should be made available through JavaScript when form is valid -->
                    <input type="submit" value="Create Account" class="btn btn-primary">

                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer th:replace="~{index :: footer}"> </footer>

        <script src="/scripts/user-verification.js"> </script>
    </body>
</html>
