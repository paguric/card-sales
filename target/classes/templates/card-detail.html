<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
    <head th:replace="~{base :: common_header(~{::title},~{::link})}">

        <title>Card details</title>

        <link rel="stylesheet" href="/css/card.css">

    </head>
    <body>
        <!-- Header -->
        <header th:replace="~{index :: header}"> </header>

        <!-- Navbar -->
        <nav th:replace="~{index :: navbar}"> </nav>

        <!-- Main section -->
        <main class="container mh-100 px-5 pb-5">
            <section class="d-flex flex-col">

                <!-- Card title & image -->
                <div class="col">
                    <h1 th:text="${card.name}"></h1>
                    <img th:src="@{/card/{id}/image(id=${card.id})}" alt="Card image" width="200">
                </div>

                <!-- Description & buttons -->
                <div class="col">
                    <dl class="card-description">
                        <dt>Autore:</dt>
                        <dd th:text="${card.author}"></dd>
                        <dt>Data:</dt>
                        <dd th:text="${#dates.format(card.date, 'dd/MM/yyyy')}"></dd>
                        <dt>Condizione:</dt>
                        <dd th:text="${card.condition}"></dd>
                        <dt>Tipo:</dt>
                        <dd th:text="${card.cardType}"></dd>
                        <dt>Descrizione:</dt>
                        <dd th:text="${card.description}"></dd>
                    </dl>

                    <!-- Commented line also allows owner to see the edit & delete buttons -->
                    <!-- <div th:if="${user != null and (user.username == card.author or user.role == adminRole)}">-->
                    <div th:if="${user != null and user.role == adminRole}">
                        <a class="btn btn-primary me-2" th:href="@{/card/{id}/edit(id=${card.id})}">Edit</a>
                        <a class="btn btn-danger" th:href="@{/card/{id}/delete(id=${card.id})}">Delete</a>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer th:replace="~{index :: footer}"> </footer>
    </body>
</html>
